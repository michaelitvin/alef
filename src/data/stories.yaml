  - id: eich-mesachakim-kaduregel
    title: אֵיךְ מְשַׂחֲקִים כַּדּוּרֶגֶל?
    difficulty: 3
    emoji: ⚽
    paragraphs:
      - בְּמִשְׂחַק כַּדּוּרֶגֶל יֵשׁ שְׁתֵּי קְבוּצוֹת, וּבְכָל קְבוּצָה אַחַד עָשָׂר שַׂחְקָנִים. מְשַׂחֲקִים עַל מִגְרַשׁ דֶּשֶׁא גָּדוֹל, וּבְכָל צַד יֵשׁ שַׁעַר עִם רֶשֶׁת. הַמַּטָּרָה פְּשׁוּטָה — לְהַכְנִיס אֶת הַכַּדּוּר לַשַּׁעַר שֶׁל הַקְּבוּצָה הַשְּׁנִיָּה. כָּל פַּעַם שֶׁהַכַּדּוּר נִכְנָס לָרֶשֶׁת — גּוֹל! הַקְּבוּצָה עִם הֲכִי הַרְבֵּה גּוֹלִים מְנַצַּחַת.
      - יֵשׁ חֹק חָשׁוּב מְאֹד — אָסוּר לָגַעַת בַּכַּדּוּר בַּיָּדַיִם! מְשַׂחֲקִים רַק בָּרַגְלַיִם, בָּרֹאשׁ אוֹ בֶּחָזֶה. רַק לְשַׂחְקָן אֶחָד מֻתָּר לִתְפֹּס אֶת הַכַּדּוּר בַּיָּדַיִם — לַשּׁוֹעֵר שֶׁשּׁוֹמֵר עַל הַשַּׁעַר, וְגַם לוֹ רַק קָרוֹב לַשַּׁעַר שֶׁלּוֹ.
      - עַל הַמִּגְרָשׁ יֵשׁ גַּם שׁוֹפֵט עִם מַשְׁרוֹקִית. אִם שַׂחְקָן מַפִּיל אוֹ דּוֹחֵף שַׂחְקָן אַחֵר, זוֹ עֲבֵרָה, וְהַשּׁוֹפֵט שׁוֹרֵק. עַל עֲבֵרָה חֲמוּרָה הַשַּׂחְקָן מְקַבֵּל כַּרְטִיס צָהֹב — אַזְהָרָה! וְעַל עֲבֵרָה חֲמוּרָה מְאֹד — כַּרְטִיס אָדֹם, וְהַשַּׂחְקָן יוֹצֵא מִן הַמִּשְׂחָק.
      - וּמָה זֶה פֶּנְדֶּל? אִם יֵשׁ עֲבֵרָה קָרוֹב מְאֹד לַשַּׁעַר, שַׂחְקָן אֶחָד בּוֹעֵט לְבַד מוּל הַשּׁוֹעֵר. כָּל הָאִצְטַדְיוֹן עוֹצֵר אֶת הַנְּשִׁימָה... הַאִם יִהְיֶה גּוֹל?
      - מִשְׂחָק נִמְשָׁךְ תִּשְׁעִים דַּקּוֹת — שְׁנֵי חֲצָאִים שֶׁל אַרְבָּעִים וְחָמֵשׁ דַּקּוֹת, וּבֵינֵיהֶם הַפְסָקָה קְטַנָּה. וְאִם בְּסוֹף הַמִּשְׂחָק יֵשׁ תֵּיקוֹ בַּמּוֹנְדִּיאָל? מוֹסִיפִים עוֹד זְמַן, וְאִם עֲדַיִן תֵּיקוֹ — בּוֹעֲטִים פֶּנְדָּלִים עַד שֶׁיֵּשׁ מְנַצֵּחַ! עַכְשָׁו אַתֶּם יוֹדְעִים אֵיךְ מְשַׂחֲקִים, וְאֶפְשָׁר לִצְפּוֹת בַּמִּשְׂחָקִים כְּמוֹ אַלּוּפִים.
