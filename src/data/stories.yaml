# Short Hebrew stories with comprehension questions
# All text fully vocalized for first graders

stories:
  - id: motek-vehechatul
    title: מוֹתֶק וְהֶחָתוּל
    difficulty: 1
    emoji: 🐶
    paragraphs:
      - לְמוֹתֶק הַכֶּלֶב יֵשׁ מִטָּה רַכָּה וּכְחֻלָּה. בֹּקֶר אֶחָד בָּא חָתוּל גָּדוֹל מֵהַשְּׁכֵנִים, נִכְנַס לַבַּיִת, וְנִרְדַּם לוֹ בַּמִּטָּה! מוֹתֶק נָבַח הַב! זוֹ הַמִּטָּה שֶׁלִּי! הֶחָתוּל פָּתַח עַיִן אַחַת, אָמַר מְיָאוּ, וְלֹא זָז.
      - מוֹתֶק הֵבִיא עֶצֶם. הֶחָתוּל לֹא זָז. מוֹתֶק רָקַד רִקּוּד מַצְחִיק. הֶחָתוּל לֹא זָז. מוֹתֶק יִלֵּל יְלָלָה עֲצוּבָה. הֶחָתוּל יָשֵׁן.
      - בָּעֶרֶב בָּא דָּנִי הַבַּיְתָה, וּמָה הוּא רָאָה? כֶּלֶב וְחָתוּל יְשֵׁנִים בַּמִּטָּה בְּיַחַד, חִבּוּק אֶחָד גָּדוֹל וְחָמוּד.
    questions:
      - question: מָה יֵשׁ לְמוֹתֶק?
        options: [מִטָּה רַכָּה, עֶצֶם גְּדוֹלָה, כַּדּוּר אָדֹם]
        correctIndex: 0
      - question: מִי נִרְדַּם בַּמִּטָּה שֶׁל מוֹתֶק?
        options: [כֶּלֶב אַחֵר, חָתוּל גָּדוֹל, צִפּוֹר קְטַנָּה]
        correctIndex: 1
      - question: מָה עָשָׂה מוֹתֶק כְּדֵי לְהָזִיז אֶת הֶחָתוּל?
        options: [רָקַד רִקּוּד מַצְחִיק, הֵבִיא כַּדּוּר, נָתַן לוֹ חָלָב]
        correctIndex: 0
      - question: מָה רָאָה דָּנִי בָּעֶרֶב?
        options: [מִטָּה רֵיקָה, חָתוּל לְבַד, כֶּלֶב וְחָתוּל בְּיַחַד]
        correctIndex: 2

  - id: haganav-hamistori
    title: הַגַּנָּב הַמִּסְתּוֹרִי
    difficulty: 2
    emoji: 🕵️
    paragraphs:
      - בַּבַּיִת שֶׁל נוֹעָה קוֹרִים דְּבָרִים מוּזָרִים. בְּיוֹם רִאשׁוֹן נֶעֶלְמָה גֶּרֶב אַחַת. בְּיוֹם שֵׁנִי נֶעֶלְמָה עוּגִיָּה מֵהַצַּלַּחַת. בְּיוֹם שְׁלִישִׁי נֶעְלַם הַמַּפְתֵּחַ שֶׁל אַבָּא! אָמְרָה נוֹעָה לְיוֹנָתָן יֵשׁ גַּנָּב בַּבַּיִת. הַלַּיְלָה נִתְפֹּס אוֹתוֹ!
      - בַּלַּיְלָה הֵם הִתְחַבְּאוּ מֵאֲחוֹרֵי הַסַּפָּה עִם פָּנָס. פִּתְאוֹם שָׁמְעוּ קְרַע, קְרַע! נוֹעָה הִדְלִיקָה אֶת הַפָּנָס, וְעַל הַחַלּוֹן עָמַד... עוֹרֵב שָׁחֹר וְגָדוֹל, וְהַמַּפְתֵּחַ בַּמַּקּוֹר שֶׁלּוֹ!
      - לְמָחֳרָת מָצְאוּ עַל הַגַּג קֵן מָלֵא אוֹצָרוֹת. גֶּרֶב, עוּגִיָּה, וְגַם כַּפְתּוֹר נוֹצֵץ. אֵיזֶה גַּנָּב חָמוּד!
    questions:
      - question: מָה נֶעְלַם בְּיוֹם שְׁלִישִׁי?
        options: [גֶּרֶב אַחַת, הַמַּפְתֵּחַ שֶׁל אַבָּא, עוּגִיָּה מְתוּקָה]
        correctIndex: 1
      - question: אֵיפֹה הִתְחַבְּאוּ נוֹעָה וְיוֹנָתָן?
        options: [מֵאֲחוֹרֵי הַסַּפָּה, מִתַּחַת לַמִּטָּה, בָּאָרוֹן]
        correctIndex: 0
      - question: מִי הָיָה הַגַּנָּב?
        options: [שָׁכֵן מוּזָר, חָתוּל שָׁחֹר, עוֹרֵב גָּדוֹל]
        correctIndex: 2
      - question: מָה הָיָה בַּקֵּן עַל הַגַּג?
        options: [גֶּרֶב וְעוּגִיָּה וְכַפְתּוֹר, רַק אֲבָנִים, סְפָרִים קְטַנִּים]
        correctIndex: 0

  - id: hakarich-hamuzar
    title: הַכְּרִיךְ הַמּוּזָר
    difficulty: 2
    emoji: 🥪
    paragraphs:
      - בַּבֹּקֶר אַבָּא הָיָה עָיֵף מְאֹד מְאֹד. הוּא הֵכִין כְּרִיךְ לְרוֹנִי וְשָׂם בּוֹ גְּבִינָה צְהֻבָּה, מְלָפְפוֹן, וְ... גֶּרֶב אָדֹם! אֶת הַגֶּרֶב הַשֵּׁנִי הוּא שָׂם בַּמְּקָרֵר.
      - בַּהַפְסָקָה רוֹנִי פָּתְחָה אֶת הַכְּרִיךְ וְצָעֲקָה אַבָּא שָׁכַח שֶׁגֶּרֶב זֶה לֹא אֹכֶל! כָּל הַיְּלָדִים צָחֲקוּ, וְגַם הַמּוֹרָה.
      - בָּעֶרֶב חִפֵּשׂ אַבָּא אֶת הַגַּרְבַּיִם שֶׁלּוֹ. רוֹנִי פָּתְחָה אֶת הַמְּקָרֵר וְאָמְרָה אַבָּא, מָצָאתִי! מָחָר אֲנִי מְכִינָה אֶת הַכְּרִיךְ, וְאַתָּה הוֹלֵךְ לִישֹׁן מֻקְדָּם!
    questions:
      - question: מָה שָׂם אַבָּא בַּכְּרִיךְ?
        options: [רַק גְּבִינָה, שׁוֹקוֹלָד וּבָנָנָה, גְּבִינָה וְגֶרֶב]
        correctIndex: 2
      - question: אֵיפֹה הָיָה הַגֶּרֶב הַשֵּׁנִי?
        options: [בַּמְּקָרֵר, בַּתִּיק שֶׁל רוֹנִי, בַּכִּיס שֶׁל אַבָּא]
        correctIndex: 0
      - question: מָה עָשְׂתָה רוֹנִי בַּהַפְסָקָה?
        options: [בָּכְתָה, צָעֲקָה וְצָחֲקָה, יָשְׁנָה]
        correctIndex: 1
      - question: מָה יַעֲשֶׂה אַבָּא מָחָר?
        options: [יֵלֵךְ לִישֹׁן מֻקְדָּם, יָכִין עוֹד כְּרִיךְ, יֹאכַל גֶּרֶב]
        correctIndex: 0

  - id: hamondial-kan
    title: הַמּוֹנְדִּיאָל כָּאן!
    difficulty: 2
    emoji: 🏆
    paragraphs:
      - פַּעַם בְּאַרְבַּע שָׁנִים יֵשׁ טוּרְנִיר עֲנָק בְּכַדּוּרֶגֶל — הַמּוֹנְדִּיאָל! נִבְחָרוֹת מִכָּל הָעוֹלָם בָּאוֹת לְשַׂחֵק, וְכָל קְבוּצָה חוֹלֶמֶת לְהָרִים אֶת גְּבִיעַ הַזָּהָב הַנּוֹצֵץ.
      - הַקַּיִץ הַמּוֹנְדִּיאָל מִתְקַיֵּם בְּאַמֶרִיקָה — בְּאַרְצוֹת הַבְּרִית, בְּקָנָדָה וּבְמֶקְסִיקוֹ. אַרְבָּעִים וּשְׁמוֹנֶה נִבְחָרוֹת הִגִּיעוּ, וְהָאִצְטַדְיוֹנִים מְלֵאִים בַּאֲלָפִים שֶׁל אוֹהֲדִים שָׂמְחִים וְרוֹעֲשִׁים.
      - וְהִגִּיעַ הַחֵלֶק הֲכִי מוֹתֵחַ — נִשְׁאֲרוּ רַק אַרְבַּע נִבְחָרוֹת חֲזָקוֹת. שִׂחֲקוּ צָרְפַת, סְפָרַד, אַנְגְּלִיָּה וְאַרְגֶּנְטִינָה. בַּחֲצִי הַגְּמָר סְפָרַד נִצְּחָה אֶת צָרְפַת, וְאַרְגֶּנְטִינָה נִצְּחָה אֶת אַנְגְּלִיָּה. וְכָךְ הִגִּיעוּ לַגְּמָר הַגָּדוֹל שְׁתֵּי נִבְחָרוֹת חֲזָקוֹת — סְפָרַד מוּל אַרְגֶּנְטִינָה, הָאַלּוּפָה שֶׁל הַמּוֹנְדִּיאָל הַקּוֹדֵם. מִי יָרִים אֶת הַגָּבִיעַ?
    questions:
      - question: כָּל כַּמָּה שָׁנִים יֵשׁ מוֹנְדִּיאָל?
        options: [כָּל שָׁנָה, כָּל אַרְבַּע שָׁנִים, כָּל עֶשֶׂר שָׁנִים]
        correctIndex: 1
      - question: אֵיפֹה מִתְקַיֵּם הַמּוֹנְדִּיאָל הַקַּיִץ?
        options: [בְּאַמֶרִיקָה, בְּיִשְׂרָאֵל, בְּיַפָּן]
        correctIndex: 0
      - question: מִי הִגִּיעוּ לַגְּמָר הַגָּדוֹל?
        options: [צָרְפַת וְאַנְגְּלִיָּה, סְפָרַד וְאַרְגֶּנְטִינָה, קָנָדָה וּמֶקְסִיקוֹ]
        correctIndex: 1
      - question: מָה חוֹלֶמֶת כָּל קְבוּצָה לְהָרִים?
        options: [גְּבִיעַ זָהָב נוֹצֵץ, כַּדּוּר חָדָשׁ, גֶּרֶב אָדֹם]
        correctIndex: 0

  - id: lio-messi
    title: לִיאוֹ מֶסִי
    difficulty: 2
    emoji: ⭐
    paragraphs:
      - בְּעִיר בְּשֵׁם רוֹסָרְיוֹ שֶׁבְּאַרְגֶּנְטִינָה גָּר יֶלֶד קָטָן בְּשֵׁם לִיאוֹ מֶסִי. הוּא הָיָה נָמוּךְ מִכָּל הַחֲבֵרִים שֶׁלּוֹ, אֲבָל כְּשֶׁהַכַּדּוּר הָיָה בָּרַגְלַיִם שֶׁלּוֹ — אַף אֶחָד לֹא הִצְלִיחַ לַעֲצֹר אוֹתוֹ.
      - הָרוֹפְאִים אָמְרוּ שֶׁלִּיאוֹ צָרִיךְ תְּרוּפָה מְיֻחֶדֶת כְּדֵי לִגְדֹּל, וְהִיא עָלְתָה הַרְבֵּה כֶּסֶף. קְבוּצָה גְּדוֹלָה מִסְּפָרַד בְּשֵׁם בַּרְצֶלוֹנָה רָאֲתָה אֵיךְ הוּא מְשַׂחֵק וְאָמְרָה אֲנַחְנוּ נַעֲזֹר לוֹ! לִיאוֹ טָס לִסְפָרַד, גָּדַל, וְנִהְיָה אֶחָד הַשַּׂחְקָנִים הֲכִי טוֹבִים בָּעוֹלָם.
      - כָּל הַחַיִּים מֶסִי חָלַם לִזְכּוֹת בַּמּוֹנְדִּיאָל עִם אַרְגֶּנְטִינָה. הוּא נִסָּה וְנִסָּה, וְלִפְנֵי אַרְבַּע שָׁנִים זֶה סוֹף סוֹף קָרָה — אַרְגֶּנְטִינָה נִצְּחָה בַּגְּמָר, וּמֶסִי הֵרִים אֶת הַגָּבִיעַ וּבָכָה מִשִּׂמְחָה.
      - וְעַכְשָׁו מֶסִי כְּבָר בֶּן שְׁלוֹשִׁים וָתֵשַׁע, וְהוּא עֲדַיִן קוֹסֵם! בַּמּוֹנְדִּיאָל הַזֶּה הוּא כָּבַשׁ שְׁמוֹנָה שְׁעָרִים — יוֹתֵר מִכָּל שַׂחְקָן אַחֵר. אַרְגֶּנְטִינָה נִצְּחָה אֶת אַנְגְּלִיָּה בַּחֲצִי הַגְּמָר וְהִגִּיעָה לַגְּמָר הַגָּדוֹל. אֲבָל שָׁם חִכְּתָה סְפָרַד הַחֲזָקָה, וְהַפַּעַם אַרְגֶּנְטִינָה הִפְסִידָה. מֶסִי לֹא הֵרִים אֶת הַגָּבִיעַ, אֲבָל הוּא עֲדַיִן אֶחָד הַשַּׂחְקָנִים הֲכִי גְּדוֹלִים בָּעוֹלָם.
    questions:
      - question: אֵיפֹה גָּר לִיאוֹ כְּשֶׁהָיָה יֶלֶד?
        options: [בִּסְפָרַד, בְּאַרְגֶּנְטִינָה, בְּאַנְגְּלִיָּה]
        correctIndex: 1
      - question: מִי עָזַר לְלִיאוֹ הַקָּטָן וְלָקַח אוֹתוֹ לִסְפָרַד?
        options: [בַּרְצֶלוֹנָה, בֵּית הַסֵּפֶר, הַשְּׁכֵנִים]
        correctIndex: 0
      - question: מָה קָרָה לִפְנֵי אַרְבַּע שָׁנִים?
        options: [מֶסִי הִפְסִיק לְשַׂחֵק, אַרְגֶּנְטִינָה זָכְתָה בַּמּוֹנְדִּיאָל, מֶסִי עָבַר לְיַפָּן]
        correctIndex: 1
      - question: כַּמָּה שְׁעָרִים כָּבַשׁ מֶסִי בַּמּוֹנְדִּיאָל הַזֶּה?
        options: [שְׁנַיִם, חֲמִשָּׁה, שְׁמוֹנָה]
        correctIndex: 2

  - id: haiparon-hakasum
    title: הָעִפָּרוֹן הַקָּסוּם
    difficulty: 3
    emoji: ✏️
    paragraphs:
