# Short Hebrew stories with comprehension questions
# All text fully vocalized for first graders

stories:
  - id: motek-vehechatul
    title: מוֹתֶק וְהֶחָתוּל
    difficulty: 1
    emoji: 🐶
    paragraphs:
      - לְמוֹתֶק הַכֶּלֶב יֵשׁ מִטָּה רַכָּה וּכְחֻלָּה. בֹּקֶר אֶחָד בָּא חָתוּל גָּדוֹל מֵהַשְּׁכֵנִים, נִכְנַס לַבַּיִת, וְנִרְדַּם לוֹ בַּמִּטָּה! מוֹתֶק נָבַח הַב! זוֹ הַמִּטָּה שֶׁלִּי! הֶחָתוּל פָּתַח עַיִן אַחַת, אָמַר מְיָאוּ, וְלֹא זָז.
      - מוֹתֶק הֵבִיא עֶצֶם. הֶחָתוּל לֹא זָז. מוֹתֶק רָקַד רִקּוּד מַצְחִיק. הֶחָתוּל לֹא זָז. מוֹתֶק יִלֵּל יְלָלָה עֲצוּבָה. הֶחָתוּל יָשֵׁן.
      - בָּעֶרֶב בָּא דָּנִי הַבַּיְתָה, וּמָה הוּא רָאָה? כֶּלֶב וְחָתוּל יְשֵׁנִים בַּמִּטָּה בְּיַחַד, חִבּוּק אֶחָד גָּדוֹל וְחָמוּד.
    questions:
      - question: מָה יֵשׁ לְמוֹתֶק?
        options: [מִטָּה רַכָּה, עֶצֶם גְּדוֹלָה, כַּדּוּר אָדֹם]
        correctIndex: 0
      - question: מִי נִרְדַּם בַּמִּטָּה שֶׁל מוֹתֶק?
        options: [כֶּלֶב אַחֵר, חָתוּל גָּדוֹל, צִפּוֹר קְטַנָּה]
        correctIndex: 1
      - question: מָה עָשָׂה מוֹתֶק כְּדֵי לְהָזִיז אֶת הֶחָתוּל?
        options: [רָקַד רִקּוּד מַצְחִיק, הֵבִיא כַּדּוּר, נָתַן לוֹ חָלָב]
        correctIndex: 0
      - question: מָה רָאָה דָּנִי בָּעֶרֶב?
        options: [מִטָּה רֵיקָה, חָתוּל לְבַד, כֶּלֶב וְחָתוּל בְּיַחַד]
        correctIndex: 2

  - id: haganav-hamistori
    title: הַגַּנָּב הַמִּסְתּוֹרִי
    difficulty: 2
    emoji: 🕵️
    paragraphs:
      - בַּבַּיִת שֶׁל נוֹעָה קוֹרִים דְּבָרִים מוּזָרִים. בְּיוֹם רִאשׁוֹן נֶעֶלְמָה גֶּרֶב אַחַת. בְּיוֹם שֵׁנִי נֶעֶלְמָה עוּגִיָּה מֵהַצַּלַּחַת. בְּיוֹם שְׁלִישִׁי נֶעְלַם הַמַּפְתֵּחַ שֶׁל אַבָּא! אָמְרָה נוֹעָה לְיוֹנָתָן יֵשׁ גַּנָּב בַּבַּיִת. הַלַּיְלָה נִתְפֹּס אוֹתוֹ!
      - בַּלַּיְלָה הֵם הִתְחַבְּאוּ מֵאֲחוֹרֵי הַסַּפָּה עִם פָּנָס. פִּתְאוֹם שָׁמְעוּ טְרַק, טְרַק! נוֹעָה הִדְלִיקָה אֶת הַפָּנָס, וְעַל הַחַלּוֹן עָמַד... עוֹרֵב שָׁחֹר וְגָדוֹל, וְהַמַּפְתֵּחַ בַּמַּקּוֹר שֶׁלּוֹ!
      - לְמָחֳרָת מָצְאוּ עַל הַגַּג קֵן מָלֵא אוֹצָרוֹת. גֶּרֶב, עוּגִיָּה, וְגַם כַּפְתּוֹר נוֹצֵץ. אֵיזֶה גַּנָּב חָמוּד!
    questions:
      - question: מָה נֶעְלַם בְּיוֹם שְׁלִישִׁי?
        options: [גֶּרֶב אַחַת, הַמַּפְתֵּחַ שֶׁל אַבָּא, עוּגִיָּה מְתוּקָה]
        correctIndex: 1
      - question: אֵיפֹה הִתְחַבְּאוּ נוֹעָה וְיוֹנָתָן?
        options: [מֵאֲחוֹרֵי הַסַּפָּה, מִתַּחַת לַמִּטָּה, בָּאָרוֹן]
        correctIndex: 0
      - question: מִי הָיָה הַגַּנָּב?
        options: [שָׁכֵן מוּזָר, חָתוּל שָׁחֹר, עוֹרֵב גָּדוֹל]
        correctIndex: 2
      - question: מָה הָיָה בַּקֵּן עַל הַגַּג?
        options: [גֶּרֶב וְעוּגִיָּה וְכַפְתּוֹר, רַק אֲבָנִים, סְפָרִים קְטַנִּים]
        correctIndex: 0

  - id: hakarich-hamuzar
    title: הַכְּרִיךְ הַמּוּזָר
    difficulty: 2
    emoji: 🥪
    paragraphs:
      - בַּבֹּקֶר אַבָּא הָיָה עָיֵף מְאֹד מְאֹד. הוּא הֵכִין כְּרִיךְ לְרוֹנִי וְשָׂם בּוֹ גְּבִינָה צְהֻבָּה, מְלָפְפוֹן, וְ... גֶּרֶב אָדֹם! אֶת הַגֶּרֶב הַשֵּׁנִי הוּא שָׂם בַּמְּקָרֵר.
      - בַּהַפְסָקָה רוֹנִי פָּתְחָה אֶת הַכְּרִיךְ וְצָעֲקָה אַבָּא שָׁכַח שֶׁגֶּרֶב זֶה לֹא אֹכֶל! כָּל הַיְּלָדִים צָחֲקוּ, וְגַם הַמּוֹרָה.
      - בָּעֶרֶב חִפֵּשׂ אַבָּא אֶת הַגַּרְבַּיִם שֶׁלּוֹ. רוֹנִי פָּתְחָה אֶת הַמְּקָרֵר וְאָמְרָה אַבָּא, מָצָאתִי! מָחָר אֲנִי מְכִינָה אֶת הַכְּרִיךְ, וְאַתָּה הוֹלֵךְ לִישֹׁן מֻקְדָּם!
    questions:
      - question: מָה שָׂם אַבָּא בַּכְּרִיךְ?
        options: [רַק גְּבִינָה, שׁוֹקוֹלָד וּבָנָנָה, גְּבִינָה וְגֶרֶב]
        correctIndex: 2
      - question: אֵיפֹה הָיָה הַגֶּרֶב הַשֵּׁנִי?
        options: [בַּמְּקָרֵר, בַּתִּיק שֶׁל רוֹנִי, בַּכִּיס שֶׁל אַבָּא]
        correctIndex: 0
      - question: מָה עָשְׂתָה רוֹנִי בַּהַפְסָקָה?
        options: [בָּכְתָה, צָעֲקָה וְצָחֲקָה, יָשְׁנָה]
        correctIndex: 1
      - question: מָה יַעֲשֶׂה אַבָּא מָחָר?
        options: [יֵלֵךְ לִישֹׁן מֻקְדָּם, יָכִין עוֹד כְּרִיךְ, יֹאכַל גֶּרֶב]
        correctIndex: 0

  - id: haiparon-hakasum
    title: הָעִפָּרוֹן הַקָּסוּם
    difficulty: 3
    emoji: ✏️
    paragraphs:
      - לְמַיָּה יֵשׁ עִפָּרוֹן קָסוּם. כָּל מָה שֶׁהִיא מְצַיֶּרֶת נִהְיֶה אֲמִתִּי! מַיָּה צִיְּרָה פַּרְפַּר, וְהַפַּרְפַּר עָף בַּחֶדֶר. אֵיזֶה כֵּיף!
      - אֲבָל אָז מַיָּה צִיְּרָה עָנָן קָטָן, וּפִתְאוֹם יָרַד גֶּשֶׁם בְּתוֹךְ הַבַּיִת! הַסָּלוֹן נִרְטַב, הֶחָתוּל בָּרַח, וְאִמָּא צָעֲקָה מַיָּה!
      - מַיָּה חָשְׁבָה מַהֵר וְצִיְּרָה שֶׁמֶשׁ גְּדוֹלָה. הַגֶּשֶׁם נֶעְצַר, וְהַבַּיִת הִתְיַבֵּשׁ. בַּסּוֹף צִיְּרָה מַיָּה פֶּרַח יָפֶה לְאִמָּא, וְאִמָּא צָחֲקָה טוֹב שֶׁלֹּא צִיַּרְתְּ פִּיל!
    questions:
      - question: מָה קוֹרֶה כְּשֶׁמַּיָּה מְצַיֶּרֶת?
        options: [הַצִּיּוּר נֶעְלָם, הַצִּיּוּר נִהְיֶה אֲמִתִּי, כְּלוּם לֹא קוֹרֶה]
        correctIndex: 1
      - question: מָה קָרָה כְּשֶׁמַּיָּה צִיְּרָה עָנָן?
        options: [יָרַד גֶּשֶׁם בַּבַּיִת, בָּא פִּיל גָּדוֹל, הָיָה חֹשֶׁךְ]
        correctIndex: 0
      - question: אֵיךְ מַיָּה עָצְרָה אֶת הַגֶּשֶׁם?
        options: [סָגְרָה חַלּוֹן, צִיְּרָה שֶׁמֶשׁ גְּדוֹלָה, קָרְאָה לְאַבָּא]
        correctIndex: 1
      - question: מָה צִיְּרָה מַיָּה לְאִמָּא?
        options: [עוּגָה מְתוּקָה, חָתוּל קָטָן, פֶּרַח יָפֶה]
        correctIndex: 2

  - id: mogli-vehanamer
    title: מוֹגְלִי וְהַנָּמֵר
    difficulty: 3
    emoji: 🐯
    paragraphs:
      - מוֹגְלִי הוּא יֶלֶד שֶׁגָּר בַּיַּעַר עִם מִשְׁפַּחַת הַזְּאֵבִים. בַּיַּעַר גָּר גַּם נָמֵר גָּדוֹל וְרַע, שְׁמוֹ שֶׁר־חָאן, וְהוּא לֹא אוֹהֵב אֶת מוֹגְלִי. כָּל הַחַיּוֹת פּוֹחֲדוֹת מִמֶּנּוּ.
      - לַיְלָה אֶחָד הִגִּיעַ שֶׁר־חָאן אֶל הַכְּפָר וְשָׁאַג אֵיפֹה הַיֶּלֶד? הַזְּאֵבִים רָעֲדוּ. אֲבָל מוֹגְלִי לֹא בָּרַח וְלֹא בָּכָה. הוּא הֵרִים עָנָף בּוֹעֵר מִן הַמְּדוּרָה.
      - שֶׁר־חָאן רָאָה אֶת הָאֵשׁ, נָסוֹג אָחוֹרָה, וּבָרַח מַהֵר אֶל הַיַּעַר. מוֹגְלִי קָרָא אַחֲרָיו הַיַּעַר הַזֶּה הוּא גַּם הַבַּיִת שֶׁלִּי! וְכָל הַזְּאֵבִים יִלְּלוּ בְּשִׂמְחָה מוֹגְלִי גִּבּוֹר!
    questions:
      - question: אֵיפֹה גָּר מוֹגְלִי?
        options: [בַּיַּעַר עִם הַזְּאֵבִים, בַּבַּיִת עִם אַבָּא, בַּגַּן הַגָּדוֹל]
        correctIndex: 0
      - question: מָה עָשָׂה שֶׁר־חָאן בַּלַּיְלָה?
        options: [יָשַׁן בַּמְּעָרָה, הִגִּיעַ וְשָׁאַג, טִפֵּס עַל עֵץ]
        correctIndex: 1
      - question: מִמָּה פָּחַד שֶׁר־חָאן?
        options: [מִן הַמַּיִם, מִן הַזְּאֵבִים, מִן הָאֵשׁ]
        correctIndex: 2
      - question: מָה קָרָא מוֹגְלִי אַחֲרֵי שֶׁשֶּׁר־חָאן בָּרַח?
        options: [הַיַּעַר הוּא גַּם הַבַּיִת שֶׁלִּי, לַיְלָה טוֹב לְכֻלָּם, בּוֹא נְשַׂחֵק]
        correctIndex: 0
